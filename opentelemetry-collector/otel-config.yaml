# extensions:
#   health_check:
#   pprof:
#   zpages:

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus/collector:
    config:
      scrape_configs:
        - job_name: 'opentelemetry-collector-metrics'
          static_configs:
            - targets: ['localhost:8888']
        - job_name: 'grafana-metrics'
          scrape_interval: 10s
          static_configs:
          - targets: ['grafana:3000']
        - job_name: 'loki-metrics'
          dns_sd_configs:
            - names:
                - loki
              type: A
              port: 3100

  nginx:
    endpoint: "http://nginx:80/nginx_status"
    collection_interval: 10s

  filelog:
    include:
      - '/var/log/nginx/access.log'

processors:
  batch:
    timeout: 10s

  memory_limiter:
    limit_mib: 500
    check_interval: 1s

exporters:
  otlphttp/metrics:
    endpoint: http://prometheus:9090/api/v1/otlp
    tls:
      insecure: true

  otlphttp/mimir:
    endpoint: http://mimir:9009/otlp
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://mimir:9009/api/v1/push
    tls:
      insecure: true

  otlphttp/traces:
    endpoint: http://tempo:4418
    tls:
      insecure: true

  otlphttp/logs:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  logging/metrics:
    verbosity: detailed

  logging/traces:
    verbosity: detailed

  logging/logs:
    verbosity: detailed

service:
  # extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/traces]
    metrics:
      receivers: [otlp, prometheus/collector, nginx]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/mimir]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/logs]
    logs/nginx:
      receivers: [filelog]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/logs]
