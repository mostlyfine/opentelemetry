extensions:
  health_check:
  pprof:
  zpages:

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus/collector:
    config:
      scrape_configs:
        - job_name: 'opentelemetry-collector'
          static_configs:
            - targets: ['opentelemetry-collector:8888']
        - job_name: 'grafana'
          static_configs:
            - targets: ['grafana:3000']
        - job_name: 'loki'
          static_configs:
            - targets: ['loki:3100']
        - job_name: 'tempo'
          static_configs:
            - targets: ['tempo:3200']
        - job_name: 'pyroscope'
          static_configs:
            - targets: ['pyroscope:4040']
        - job_name: 'mimir'
          static_configs:
            - targets: ['mimir:9009']


  nginx:
    endpoint: "http://nginx:80/nginx_status"
    collection_interval: 10s

  filelog/nginx:
    resource:
      service.namespace: sample
      service.name: nginx
    include:
      - '/var/log/nginx/access.log'

processors:
  batch:
    timeout: 10s

  memory_limiter:
    limit_mib: 500
    check_interval: 1s

  resourcedetection:
    detectors: [system]

exporters:
  otlphttp/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
    tls:
      insecure: true

  otlphttp/mimir:
    endpoint: http://mimir:9009/otlp
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://mimir:9009/api/v1/push
    tls:
      insecure: true

  otlphttp/traces:
    endpoint: http://tempo:4418
    tls:
      insecure: true

  otlphttp/logs:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  logging/metrics:
    verbosity: detailed

  logging/traces:
    verbosity: detailed

  logging/logs:
    verbosity: detailed

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/traces]
    metrics:
      receivers: [otlp, prometheus/collector, nginx]
      processors: [resourcedetection, memory_limiter, batch]
      exporters: [otlphttp/mimir]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, memory_limiter, batch]
      exporters: [otlphttp/logs]
    logs/nginx:
      receivers: [filelog/nginx]
      processors: [resourcedetection, memory_limiter, batch]
      exporters: [otlphttp/logs]
